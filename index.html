<!doctype html>
<html lang="en">
  <head>
    <title>noob</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="noob.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" auto-rotate scale="1 1 1" orientation="0deg 0deg 45deg" >
      <button class="Hotspot" slot="hotspot-1" data-position="0.004972264645292989m 0.031107771120198205m 0.0630642886046604m" data-normal="0.0005165357730070598m -0.0009714918615273517m 0.9999993946969961m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">body</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
  </body>
</html>
